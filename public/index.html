<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Principal - Musicalização Infantil - Regional Itapevi</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="stylesheet" href="/styles/main.css?v=1.0.8" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/scripts/auth.js?v=1.0.8"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body
  style="background: #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

  <div class="top-nav">
    <div style="display: flex; align-items: center; gap: 12px;">
      <img src="/assets/logo-ccb.png" style="height: 46px;" alt="CCB" />
      <span style="font-weight: 700; color: var(--brand);">Regional Itapevi</span>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <a href="#" id="btnLogoutTop" class="btn-logout">Sair</a>
    </div>
  </div>

  <main class="auth-wrap">
    <div
      style="display: flex !important; flex-direction: column !important; align-items: center !important; justify-content: center !important; gap: 30px; width: 100%; margin: 60px 0;">
      <div class="card" style="position: relative; margin: 0 auto; width: 580px; max-width: 100%;">
        <header class="card-header"
          style="background: var(--brand); color: #fff; padding: 32px 24px; text-align: center;">
          <img src="/assets/logo-ccb.png" alt="CCB" class="logo"
            style="max-width: 220px; margin-bottom: 16px; filter: brightness(0) invert(1);" />
          <h1 style="margin: 0; font-size: 24px; font-weight: 700; text-transform: uppercase;">Musicalização Infantil
          </h1>
          <p id="headerSubtitle" style="margin: 8px 0 0; font-size: 15px; opacity: 0.9; line-height: 1.4;">Lançamento de Presença</p>
        </header>

        <div class="sac-body">
          <form id="selectionForm" class="sac-form">
            <!-- Mês e Ano -->
            <div class="form-group">
              <div class="input-icon-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y1="10"></line>
                </svg>
              </div>
              <div style="display: flex; gap: 8px; flex: 1;">
                <select id="mes" name="mes" required style="flex: 2;"></select>
                <select id="ano" name="ano" required style="flex: 1;"></select>
              </div>
            </div>

            <input type="hidden" id="municipio" name="municipio" required />
            <input type="hidden" id="comum" name="comum" required />

            <!-- Polo -->
            <div class="form-group">
              <div class="input-icon-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                  <circle cx="12" cy="10" r="3"></circle>
                </svg>
              </div>
              <div class="sac-search-container">
                <input type="text" id="comumSearch" placeholder="Pesquise seu Polo..." autocomplete="off" />
                <div id="comumResults" class="sac-search-results"></div>
              </div>
            </div>

            <div style="margin-top: 30px;">
              <p style="margin-bottom: 20px; color: #64748b; font-size: 14px; text-align: center;">Selecione o tipo de
                lançamento:</p>
              <div class="grid-btns" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 0;">
                <button type="button" class="sac-btn" onclick="handleNavigation('all')" style="margin-top: 0;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y1="10"></line>
                    <path d="M8 14h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M16 14h.01"></path>
                    <path d="M8 18h.01"></path>
                    <path d="M12 18h.01"></path>
                    <path d="M16 18h.01"></path>
                  </svg>
                  MENSAL
                </button>
                <button type="button" class="sac-btn btn-secondary" onclick="handleNavigation('single')"
                  style="margin-top: 0;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y1="10"></line>
                    <path d="m9 16 2 2 4-4"></path>
                  </svg>
                  DATA ÚNICA
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <footer class="sac-page-footer">
        <span class="footer-brand">&copy; Aplicativo Musicalização Infantil v1.0</span>
        <a href="#" class="footer-ccb">Congregação Cristã no Brasil</a>
        <span class="footer-region">Regional Itapevi</span>
      </footer>
    </div>
  </main>

  <script>
    // Proteger a rota e popular UI
    window.addEventListener('load', async () => {
      window.currentUser = await window.checkAuth();

      // Popular Comuns (Polos de Musicalização)
      const comumInput = document.getElementById('comum');
      const comumSearch = document.getElementById('comumSearch');
      const comumResults = document.getElementById('comumResults');
      let allComuns = [];
      const findComum = (value = '') => {
        const term = String(value || '').trim().toLowerCase();
        if (!term) return null;
        return allComuns.find((item) => String(item.comum || '').trim().toLowerCase() === term) || null;
      };

      try {
        const resComuns = await fetch('/api/comuns');
        allComuns = await resComuns.json();

        const renderResults = (filter = '') => {
          const filtered = allComuns.filter(c =>
            c.comum.toLowerCase().includes(filter.toLowerCase()) ||
            c.cidade.toLowerCase().includes(filter.toLowerCase())
          );

          comumResults.innerHTML = filtered.map(c => `
            <div class="sac-search-item" data-value="${c.comum}" data-city="${c.cidade}">
              <strong>${c.comum}</strong><br>
              <small style="color: #64748b">${c.cidade}</small>
            </div>
          `).join('');

          comumResults.classList.toggle('active', filtered.length > 0 && filter !== '');
        };

        comumSearch.addEventListener('input', (e) => renderResults(e.target.value));
        comumSearch.addEventListener('focus', () => {
          if (comumSearch.value === '') renderResults('');
          comumResults.classList.add('active');
        });

        comumResults.addEventListener('mouseover', (e) => {
          const item = e.target.closest('.sac-search-item');
          if (item) item.style.background = '#f1f5f9';
        });

        comumResults.addEventListener('mousedown', (e) => {
          const item = e.target.closest('.sac-search-item');
          if (item) {
            const val = item.dataset.value;
            const city = item.dataset.city;
            comumSearch.value = val;
            comumInput.value = val;
            
            const headerSubtitle = document.getElementById('headerSubtitle');
            if (headerSubtitle) {
              headerSubtitle.innerHTML = `Lançamento de Presença<br><strong style="font-size: 16px;">${val}</strong>`;
            }
            document.getElementById('municipio').value = city;
            comumResults.classList.remove('active');
          }
        });

        document.addEventListener('click', (e) => {
          if (!comumSearch.contains(e.target) && !comumResults.contains(e.target)) {
            comumResults.classList.remove('active');
          }
        });

        // Trava de Polo via Perfil
        try {
          const userId = window.currentUser?.id;
          const userEmail = window.currentUser?.email || '';

          if (userId) {
            const profileRes = await window.authFetch(`/api/profile?id=${userId}&email=${encodeURIComponent(userEmail)}`);
            let profileData = await profileRes.json();

            // Verificação de permissão baseada em nível/cargo
            const allowedRoles = [1, 2, 3, 4];
            const userRoleId = parseInt(profileData.role_id || profileData.nivel || 6, 10);
            if (!allowedRoles.includes(userRoleId)) {
              document.getElementById('mes').disabled = true;
              document.getElementById('comumSearch').disabled = true;
              document.querySelectorAll('.grid-btns button').forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
                btn.removeAttribute('onclick');
              });

              const firstName = (profileData.full_name || 'Usuário').trim().split(' ')[0];

              Swal.fire({
                title: 'Acesso Restrito',
                html: `<div style="text-align: left; font-size: 14.5px; line-height: 1.6; color: #475569;">
                        <p style="margin-bottom: 14px; font-size: 16px;">Olá, <strong>${firstName}</strong>!</p>
                        <p style="margin-bottom: 14px;">Seu nível de acesso atual (<strong>${profileData.cargo || 'Candidato'}</strong>) não possui permissão para realizar novos lançamentos no aplicativo de Musicalização.</p>
                        <p style="margin-bottom: 14px; font-weight: 600; color: #dc2626; display: flex; align-items: flex-start; gap: 8px;">
                          <span style="font-size: 18px; line-height: 1;">⚠️</span>
                          <span>Lançamentos nesta seção são permitidos apenas para a Coordenação e Instrutores habilitados.</span>
                        </p>
                        <p style="margin-top: 18px; font-size: 13px; color: #64748b; border-top: 1px solid #e2e8f0; padding-top: 12px;">
                          Se você acredita que isso é um erro, entre em contato com o Secretário Regional da Música.
                        </p>
                       </div>`,
                icon: 'warning',
                iconColor: '#f59e0b',
                showCloseButton: true,
                showConfirmButton: true,
                confirmButtonText: 'Entendido',
                confirmButtonColor: '#1e4b7a',
                background: '#ffffff',
                backdrop: `rgba(15, 23, 42, 0.75)`,
                customClass: {
                  popup: 'premium-popup'
                }
              });
            }

            const profile = {
              comum: profileData.polo || profileData.comum || profileData.congregacao || profileData.localidade || '',
              cidade: profileData.cidade || profileData.municipio || profileData.city || profileData.localidade || ''
            };

            if (!profile.comum && window.currentUser.user_metadata) {
              const meta = window.currentUser.user_metadata;
              const discoveredComum = meta.polo || meta.comum || meta.congregacao || '';
              if (discoveredComum) {
                profile.comum = discoveredComum;
                profile.cidade = meta.cidade || meta.municipio || (findComum(discoveredComum) || {}).cidade || 'Itapevi';
              }
            }

            if (profile && profile.comum) {
              const userComum = profile.comum;
              const mapped = findComum(userComum);
              const userCity = (mapped || {}).cidade || profile.cidade || 'Itapevi';

              comumInput.value = userComum;
              comumSearch.value = userComum;
              comumSearch.disabled = true;
              document.getElementById('municipio').value = userCity;

              const headerSubtitle = document.getElementById('headerSubtitle');
              if (headerSubtitle) {
                headerSubtitle.innerHTML = `Lançamento de Presença<br><strong style="font-size: 16px;">${userComum}</strong>`;
              }

              const group = comumSearch.closest('.form-group');
              if (group) {
                group.classList.add('is-locked');
                const iconBox = group.querySelector('.input-icon-box');
                if (iconBox) {
                  iconBox.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;
                }
              }

              comumSearch.placeholder = "Seu Polo está fixado";
              if (comumResults) comumResults.classList.remove('active');


            }
          }
        } catch (profileErr) {
          console.error('Erro ao processar trava de perfil:', profileErr);
        }
      } catch (err) {
        console.error('Erro ao carregar comuns/polos:', err);
      }

      // Popular meses e anos
      const mesSelect = document.getElementById('mes');
      const anoSelect = document.getElementById('ano');
      const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth();

      meses.forEach((m, i) => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (i === currentMonth) opt.selected = true;
        mesSelect.appendChild(opt);
      });

      // Popular anos: ano atual e até 2 anos anteriores
      for (let y = currentYear; y >= currentYear - 2; y--) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        if (y === currentYear) opt.selected = true;
        anoSelect.appendChild(opt);
      }

      window.handleNavigation = (type) => {
        const mes = document.getElementById('mes').value;
        const comum = document.getElementById('comum').value;
        let municipio = document.getElementById('municipio').value;

        if (comum && !municipio) {
          municipio = 'Itapevi';
          document.getElementById('municipio').value = 'Itapevi';
        }

        if (!mes || !municipio || !comum) {
          const searchVal = document.getElementById('comumSearch').value;
          if (searchVal && (!comum || !municipio)) {
            const firstResult = document.querySelector('.sac-search-item');
            if (firstResult) {
              document.getElementById('comum').value = firstResult.dataset.value;
              document.getElementById('municipio').value = firstResult.dataset.city;
              return handleNavigation(type);
            }
          }

          Swal.fire({
            title: 'Campos Incompletos',
            text: 'Por favor, selecione o Mês e o Polo antes de prosseguir.',
            icon: 'warning',
            confirmButtonColor: '#1e4b7a'
          });
          return;
        }

        const mesesNomes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const mesIndex = mesesNomes.indexOf(mes);
        const year = parseInt(document.getElementById('ano').value, 10) || new Date().getFullYear();
        const sundays = [];
        const d = new Date(year, mesIndex, 1);
        while (d.getMonth() === mesIndex) {
          if (d.getDay() === 0) {
            sundays.push(new Date(d).toLocaleDateString('pt-BR'));
          }
          d.setDate(d.getDate() + 1);
        }

        const configData = {
          mes,
          ano: year,
          municipio,
          comum,
          type,
          sundays
        };

        sessionStorage.setItem('musicalizacao_config', JSON.stringify(configData));
        window.location.href = '/cadastro';
      };

      const btnSair = document.getElementById('btnLogoutTop');
      if (btnSair) {
        btnSair.onclick = async () => {
          if (!window.supabaseClient) await window.initSupabase();
          await window.supabaseClient.auth.signOut();
          window.location.href = '/login.html';
        };
      }

    });
  </script>
</body>

</html>
